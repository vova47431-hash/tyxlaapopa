<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* Карточка */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 45px 35px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 1s ease-out both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #f0f0f0;
        }

        .glass-card:hover {
            transform: scale(1.01) translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Аватар */
        .profile-img-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            display: block;
        }

        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* Имя */
        h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Печатающийся текст */
        .typewriter {
            font-size: 16px;
            font-weight: 300;
            color: #bbbbbb;
            min-height: 2.2em;
            margin-bottom: 30px;
            border-right: 2px solid #888;
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.8s step-end infinite;
            letter-spacing: 0.5px;
        }

        @keyframes blinkCursor {
            0%, 100% { border-color: #888; }
            50% { border-color: transparent; }
        }

        /* ---------- ОДНА КНОПКА С ВЫПАДАЮЩИМ МЕНЮ ---------- */
        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-top: 10px;
        }

        .dropdown-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #f0f0f0;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            user-select: none;
        }

        .dropdown-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .dropdown-btn i {
            font-size: 24px;
            transition: transform 0.3s ease;
        }

        .dropdown-btn .arrow {
            transition: transform 0.3s ease;
            margin-left: 8px;
            font-size: 18px;
        }

        .dropdown-btn.open .arrow {
            transform: rotate(180deg);
        }

        /* Выпадающий список */
        .dropdown-menu {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
            padding: 0 10px;
        }

        .dropdown-menu.open {
            max-height: 400px; /* достаточно для 5 пунктов */
            opacity: 1;
            padding: 10px;
        }

        .dropdown-menu li {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 14px;
            transition: background 0.2s ease, transform 0.2s ease;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .dropdown-menu li:last-child {
            margin-bottom: 0;
        }

        .dropdown-menu li a {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: #e0e0e0;
            font-weight: 400;
            font-size: 16px;
            width: 100%;
            transition: color 0.2s;
        }

        .dropdown-menu li a i {
            font-size: 24px;
            width: 30px;
            text-align: center;
            color: #aaa;
            transition: all 0.3s ease;
        }

        /* Эффекты при наведении на пункт */
        .dropdown-menu li:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(6px);
        }

        .dropdown-menu li:hover a {
            color: #ffffff;
        }

        /* Индивидуальные цвета иконок при наведении */
        .dropdown-menu li:hover .fa-discord { color: #8a9af5; }
        .dropdown-menu li:hover .fa-telegram { color: #5bb8e6; }
        .dropdown-menu li:hover .fa-vk { color: #4d99ff; }
        .dropdown-menu li:hover .fa-youtube { color: #ff6666; }
        .dropdown-menu li:hover .fa-coins { color: #faba4a; }

        /* Футер */
        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #666;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer a {
            color: #777;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #ffffff;
        }

        .footer .heart {
            color: #ff6b6b;
            animation: pulseHeart 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulseHeart {

            50% { transform: scale(1.2); }

        /* Адаптив */
        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            .profile-img { width: 100px; height: 100px; }
            h1 { font-size: 26px; }
            .typewriter { font-size: 14px; white-space: normal; border-right: none; animation: none; }
            .dropdown-btn { font-size: 16px; padding: 16px; }
            .dropdown-menu li a { font-size: 15px; }
        }
    </style>
</head>

    <script>
        // ---------- ЧАСТИЦЫ (белые, едва заметные) ----------
        (function particles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function initCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            initCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.3 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > width) this.speedX *= -1;
                    if (this.y < 0 || this.y > height) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.shadowColor = 'rgba(255,255,255,0.2)';
                    ctx.shadowBlur = 6;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.06 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                drawLines();
                requestAnimationFrame(animate);
            }

            animate();

            window.addEventListener('resize', () => {
                initCanvas();
                particles.forEach(p => {
                    p.x = Math.min(p.x, width);
                    p.y = Math.min(p.y, height);
                });
            });
        })();

        // ---------- ПЕЧАТАЮЩИЙСЯ ТЕКСТ ----------
        (function typewriter() {
            const el = document.getElementById('typewriter');
            const phrases = [
                'Привет, я @TYXLAAPOPA',
                'Разработчик & Создатель',
                'Добро пожаловать в мой мир'
            ];
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let currentText = '';

            function type() {
                const fullText = phrases[phraseIndex];
                if (isDeleting) {
                    currentText = fullText.substring(0, charIndex - 1);
                    charIndex--;
                } else {
                    currentText = fullText.substring(0, charIndex + 1);
                    charIndex++;
                }
                el.textContent = currentText;

                let speed = 100;
                if (isDeleting) speed = 50;

                if (!isDeleting && charIndex === fullText.length) {
                    speed = 2000;
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    speed = 500;
                }

                setTimeout(type, speed);
            }

            setTimeout(type, 800);
        })();

        // ---------- ВЫПАДАЮЩЕЕ МЕНЮ (клик по кнопке) ----------
        (function dropdown() {
            const btn = document.getElementById('dropdownBtn');
            const menu = document.getElementById('dropdownMenu');

            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = menu.classList.contains('open');
                // Закрываем все другие открытые меню (если они есть)
                // Но у нас только одно, так что просто переключаем
                menu.classList.toggle('open');
                btn.classList.toggle('open');
            });

            // Закрывать меню при клике вне его
            document.addEventListener('click', function(e) {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.classList.remove('open');
                    btn.classList.remove('open');
                }
            });

            // Закрывать меню при выборе ссылки (по желанию)
            menu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function() {
                    menu.classList.remove('open');
                    btn.classList.remove('open');
                });
            });
        })();
    </script>
